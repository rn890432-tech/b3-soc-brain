<?xml version="1.0" encoding="UTF-8"?>
<!--
  B3 SOC Brain – SOC Workflow Diagram
  Illustrates the end-to-end analyst and automation workflow
  from raw telemetry ingestion through containment and review.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 760" font-family="Segoe UI, Arial, sans-serif" font-size="13">

  <!-- Background -->
  <rect width="900" height="760" fill="#0d1117" rx="12"/>

  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" font-size="19" font-weight="bold" fill="#58a6ff">B3 SOC Brain – SOC Workflow Diagram</text>
  <text x="450" y="58" text-anchor="middle" font-size="11" fill="#8b949e">Automated detection → triage → containment → review loop</text>

  <!-- ═══════════════════════════════════════════════
       Helper: arrow marker definitions
  ═══════════════════════════════════════════════ -->
  <defs>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#58a6ff"/>
    </marker>
    <marker id="arrRed" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#f85149"/>
    </marker>
    <marker id="arrGreen" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#3fb950"/>
    </marker>
    <marker id="arrGray" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#8b949e"/>
    </marker>
  </defs>

  <!-- ── Step 1: Telemetry Ingestion ── -->
  <rect x="310" y="80" width="280" height="52" fill="#1f3a5f" stroke="#58a6ff" stroke-width="2" rx="8"/>
  <text x="450" y="103" text-anchor="middle" fill="#58a6ff" font-weight="bold">1. Telemetry Ingestion</text>
  <text x="450" y="120" text-anchor="middle" fill="#c9d1d9" font-size="11">Email · OAuth · Identity · Network · Threat Feeds</text>

  <!-- 1 → 2 -->
  <line x1="450" y1="132" x2="450" y2="160" stroke="#58a6ff" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ── Step 2: API Service normalises events ── -->
  <rect x="310" y="160" width="280" height="52" fill="#1a2e1a" stroke="#3fb950" stroke-width="2" rx="8"/>
  <text x="450" y="183" text-anchor="middle" fill="#3fb950" font-weight="bold">2. API Service (FastAPI)</text>
  <text x="450" y="200" text-anchor="middle" fill="#c9d1d9" font-size="11">Normalise · Validate · Route to AI Engine</text>

  <!-- 2 → 3 -->
  <line x1="450" y1="212" x2="450" y2="240" stroke="#58a6ff" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ── Step 3: Autonomous AI Scoring ── -->
  <rect x="270" y="240" width="360" height="66" fill="#2e1a2e" stroke="#a371f7" stroke-width="2" rx="8"/>
  <text x="450" y="263" text-anchor="middle" fill="#a371f7" font-weight="bold">3. Autonomous AI Scoring Engine</text>
  <text x="450" y="280" text-anchor="middle" fill="#c9d1d9" font-size="11">Risk Score · Anomaly Detection · MITRE Mapping</text>
  <text x="450" y="296" text-anchor="middle" fill="#8b949e" font-size="11">Threshold evaluation per tenant</text>

  <!-- 3 → diamond (decision) -->
  <line x1="450" y1="306" x2="450" y2="340" stroke="#58a6ff" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ── Decision Diamond: Threat? ── -->
  <polygon points="450,340 530,380 450,420 370,380" fill="#1a1a2e" stroke="#f0883e" stroke-width="2"/>
  <text x="450" y="376" text-anchor="middle" fill="#f0883e" font-weight="bold">Threat?</text>
  <text x="450" y="393" text-anchor="middle" fill="#8b949e" font-size="11">Score ≥ threshold?</text>

  <!-- YES → Containment (right) -->
  <line x1="530" y1="380" x2="620" y2="380" stroke="#f85149" stroke-width="1.5" marker-end="url(#arrRed)"/>
  <text x="575" y="372" text-anchor="middle" fill="#f85149" font-size="11">YES</text>

  <!-- NO → Feedback Learning (left) -->
  <line x1="370" y1="380" x2="280" y2="380" stroke="#3fb950" stroke-width="1.5" marker-end="url(#arrGreen)"/>
  <text x="325" y="372" text-anchor="middle" fill="#3fb950" font-size="11">NO</text>

  <!-- ── Step 5a (right): Automated Containment ── -->
  <rect x="620" y="352" width="240" height="56" fill="#2e1a1a" stroke="#f85149" stroke-width="2" rx="8"/>
  <text x="740" y="375" text-anchor="middle" fill="#f85149" font-weight="bold">4a. Automated Containment</text>
  <text x="740" y="392" text-anchor="middle" fill="#c9d1d9" font-size="11">Block URL · Revoke token · Quarantine</text>

  <!-- Containment → Rule Generation -->
  <line x1="740" y1="408" x2="740" y2="460" stroke="#f85149" stroke-width="1.5" marker-end="url(#arrRed)"/>

  <!-- ── Step 5b (left): Feedback / False Positive ── -->
  <rect x="40" y="352" width="240" height="56" fill="#1a2e1a" stroke="#3fb950" stroke-width="2" rx="8"/>
  <text x="160" y="375" text-anchor="middle" fill="#3fb950" font-weight="bold">4b. Feedback Learning</text>
  <text x="160" y="392" text-anchor="middle" fill="#c9d1d9" font-size="11">Log as benign · Update model</text>

  <!-- Feedback → Alert Dashboard (down-left) -->
  <line x1="160" y1="408" x2="160" y2="530" stroke="#3fb950" stroke-width="1.5" marker-end="url(#arrGreen)"/>

  <!-- ── Step 6: Autonomous Rule Generation ── -->
  <rect x="580" y="460" width="320" height="56" fill="#1a2a1a" stroke="#39d353" stroke-width="2" rx="8"/>
  <text x="740" y="483" text-anchor="middle" fill="#39d353" font-weight="bold">5. Autonomous Rule Generation</text>
  <text x="740" y="500" text-anchor="middle" fill="#c9d1d9" font-size="11">Generate · Validate · Deploy rule to endpoint/gateway</text>

  <!-- Rule Gen → Alert Dashboard -->
  <line x1="580" y1="488" x2="530" y2="488" stroke="#58a6ff" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="530" y1="488" x2="530" y2="558" stroke="#58a6ff" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ── Step 7: Alert / Dashboard Notification ── -->
  <rect x="310" y="530" width="280" height="56" fill="#1f1a3a" stroke="#a371f7" stroke-width="2" rx="8"/>
  <text x="450" y="553" text-anchor="middle" fill="#a371f7" font-weight="bold">6. Dashboard Alert &amp; Notification</text>
  <text x="450" y="570" text-anchor="middle" fill="#c9d1d9" font-size="11">SOC Dashboard · Email / Slack alert · Ticket</text>

  <!-- Feedback line also connects -->
  <line x1="160" y1="558" x2="310" y2="558" stroke="#3fb950" stroke-width="1.5" marker-end="url(#arrGreen)"/>

  <!-- Dashboard → Analyst Review -->
  <line x1="450" y1="586" x2="450" y2="618" stroke="#58a6ff" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ── Step 8: Analyst Review ── -->
  <rect x="310" y="618" width="280" height="52" fill="#1f3a5f" stroke="#58a6ff" stroke-width="2" rx="8"/>
  <text x="450" y="641" text-anchor="middle" fill="#58a6ff" font-weight="bold">7. Analyst Review &amp; Escalation</text>
  <text x="450" y="658" text-anchor="middle" fill="#c9d1d9" font-size="11">Confirm · Escalate · Close incident</text>

  <!-- Analyst Review → Feedback loop back to AI -->
  <line x1="310" y1="644" x2="80" y2="644" stroke="#8b949e" stroke-width="1.5" stroke-dasharray="5,4" marker-end="url(#arrGray)"/>
  <line x1="80" y1="644" x2="80" y2="273" stroke="#8b949e" stroke-width="1.5" stroke-dasharray="5,4" marker-end="url(#arrGray)"/>
  <line x1="80" y1="273" x2="270" y2="273" stroke="#8b949e" stroke-width="1.5" stroke-dasharray="5,4" marker-end="url(#arrGray)"/>
  <text x="50" y="460" text-anchor="middle" fill="#8b949e" font-size="10" transform="rotate(-90 50 460)">Feedback loop</text>

  <!-- ── Global Threat Graph callout ── -->
  <rect x="620" y="580" width="240" height="52" fill="#1a2e2e" stroke="#39d353" stroke-width="1.5" rx="8"/>
  <text x="740" y="602" text-anchor="middle" fill="#39d353" font-weight="bold">Global Threat Graph</text>
  <text x="740" y="619" text-anchor="middle" fill="#8b949e" font-size="11">Cross-tenant IOC correlation</text>
  <line x1="740" y1="580" x2="740" y2="516" stroke="#39d353" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrGreen)"/>

  <!-- Legend -->
  <rect x="30" y="700" width="840" height="48" fill="#161b22" stroke="#30363d" stroke-width="1" rx="6"/>
  <text x="50" y="720" fill="#f85149" font-size="11">■ Automated response</text>
  <text x="220" y="720" fill="#3fb950" font-size="11">■ Learning / benign path</text>
  <text x="420" y="720" fill="#a371f7" font-size="11">■ Dashboard / notification</text>
  <text x="630" y="720" fill="#8b949e" font-size="11">- - Feedback loop</text>
  <text x="50" y="740" fill="#8b949e" font-size="10">Avg detection-to-containment: &lt;10 s · Automated containment rate target: &gt;95% · False-positive target: &lt;3%</text>

</svg>
